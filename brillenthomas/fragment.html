<style>
  /* =============================================
     FAVR Header Fragment – Brillen Thomas (Köln)
     Simpel: Vollflächig Grün, zentrierte Nav, kein Logo
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -280px;
    width: 260px; max-width: 84vw; height: 100vh;
    background: #148453;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.25);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.2); flex-shrink: 0;
  }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 30px; height: 30px;
    border-radius: 50%; transition: background 0.12s; flex-shrink: 0;
  }
  .favr-drawer__close:hover { background: rgba(255,255,255,0.15); }
  .favr-drawer__close svg {
    width: 17px; height: 17px; fill: none; stroke: #ffffff;
    stroke-width: 2; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #ffffff; text-decoration: none;
    font-size: 16px; font-weight: 700; padding: 15px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(255,255,255,0.1); }

  /* Header */
  .favr-header { width: 100%; background: #148453; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
  .favr-header__inner {
    width: 100%; margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    gap: 46px; padding: 24px 24px;
  }
  .favr-header__nav { display: flex; align-items: center; gap: 46px; }
  .favr-header__nav a {
    color: #ffffff; text-decoration: none;
    font-size: 17px; font-weight: 700;
    white-space: nowrap; transition: opacity 0.15s;
  }
  .favr-header__nav a:hover { opacity: 0.8; }

  .favr-header__burger {
    display: none; cursor: pointer;
    width: 26px; height: 18px; flex-direction: column;
    justify-content: space-between; flex-shrink: 0;
  }
  .favr-header__burger span { display: block; height: 2px; width: 100%; background: #ffffff; }

  /* ===== Breakpoint 1: <900px – Menüpunkte enger, bleibt sichtbar ===== */
  @media (max-width: 900px) {
    .favr-header__nav { gap: 24px; }
    .favr-header__inner { gap: 24px; padding: 22px 16px; }
    .favr-header__nav a { font-size: 15px; }
  }

  /* ===== Breakpoint 2: <560px – Nav zu Burger ===== */
  @media (max-width: 560px) {
    .favr-header__nav { display: none; }
    .favr-header__inner { justify-content: flex-end; padding: 18px 20px; }
    .favr-header__burger { display: flex; }
  }
</style>

<input type="checkbox" id="favr-burger-toggle" />
<label class="favr-overlay" for="favr-burger-toggle"></label>

<div class="favr-drawer">
  <div class="favr-drawer__head">
    <label class="favr-drawer__close" for="favr-burger-toggle" aria-label="Menü schließen">
      <svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg>
    </label>
  </div>
  <nav class="favr-drawer__nav" aria-label="Hauptnavigation mobil">
    <a href="https://www.sumupbookings.com/brillen-thomas-nachhaltige-augenoptik">Termin</a>
    <a href="https://www.brillenthomas.de/kontakt-anfahrt/">Info</a>
    <a href="https://www.favrspecs.com/de/optiker/in/koeln/208/brillen-thomas/16805/pro/marken/rolf/87/">Live-Anprobe</a>
    <a href="https://www.brillenthomas.de/">News</a>
  </nav>
</div>

<header class="favr-header">
  <div class="favr-header__inner">
    <nav class="favr-header__nav" aria-label="Hauptnavigation">
      <a href="https://www.sumupbookings.com/brillen-thomas-nachhaltige-augenoptik">Termin</a>
      <a href="https://www.brillenthomas.de/kontakt-anfahrt/">Info</a>
      <a href="https://www.favrspecs.com/de/optiker/in/koeln/208/brillen-thomas/16805/pro/marken/rolf/87/">Live-Anprobe</a>
      <a href="https://www.brillenthomas.de/">News</a>
    </nav>
    <label class="favr-header__burger" for="favr-burger-toggle" aria-label="Menü öffnen">
      <span></span><span></span><span></span>
    </label>
  </div>
</header>
