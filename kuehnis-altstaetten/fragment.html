<style>
  /* =============================================
     FAVR Header Fragment – Kühnis Optik
     Dunkler Hintergrund, zentrierter Frame, Logo + Text mittig
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  #favr-burger-toggle { display: none; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; height: 100vh; background: #1e2228;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.4);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
  }
  .favr-drawer__head img { height: 36px; width: auto; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: rgba(255,255,255,0.08); }
  .favr-drawer__close svg {
    width: 20px; height: 20px; fill: none; stroke: #ffffff;
    stroke-width: 1.5; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: rgba(255,255,255,0.85); text-decoration: none;
    font-size: 15px; font-weight: 400; padding: 14px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    transition: color 0.12s, background 0.12s;
  }
  .favr-drawer__nav a:hover { color: #4db8e8; background: rgba(255,255,255,0.05); }
  .favr-drawer__footer {
    padding: 20px 22px; font-size: 12px; color: rgba(255,255,255,0.4);
    line-height: 1.75; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;
  }
  .favr-drawer__footer a { color: rgba(255,255,255,0.6); text-decoration: none; }

  /* ── Header ── */
  .favr-header {
    display: block; width: 100%;
    background: #1e2228;
    position: sticky; top: 0; z-index: 1000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  .favr-header__inner {
    display: flex; flex-direction: row; align-items: center;
    justify-content: space-between;
    max-width: 1400px; margin: 0 auto;
    width: 100%; height: 96px; padding: 0 32px;
  }

  /* Logo + Text mittig untereinander */
  .favr-header__logo {
    display: flex; flex-direction: column; align-items: center;
    text-decoration: none; flex: 0 0 auto; gap: 4px;
  }
  .favr-header__logo img { height: 77px; width: auto; display: block; }
  .favr-header__logo-text {
    font-size: 9px; font-weight: 700; color: #ffffff;
    letter-spacing: 0.12em; text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    white-space: nowrap;
  }

  .favr-header__nav {
    display: flex; align-items: center; gap: 0; flex: 0 0 auto;
  }
  .favr-header__nav a {
    color: #ffffff; text-decoration: none;
    font-size: 18px; font-weight: 100;
    padding: 0 18px; white-space: nowrap;
    transition: color 0.15s;
    letter-spacing: 0.06em;
    font-family: "Fedra Sans", "Fedra", "Quicksand", -apple-system, sans-serif;
  }
  .favr-header__nav a:hover { color: #ffffff; }
  .favr-header__nav a.is-active { color: #ffffff; }

  .favr-header__burger {
    display: none; align-items: center; justify-content: center;
    cursor: pointer; width: 36px; height: 36px;
    flex-shrink: 0; background: none; border: none; padding: 0;
  }
  .favr-header__burger svg {
    width: 24px; height: 24px; fill: none;
    stroke: #ffffff; stroke-width: 1.8; stroke-linecap: round;
  }

  @media (max-width: 1100px) {
    .favr-header__inner { height: 70px; padding: 0 20px; }
    .favr-header__logo img { height: 44px; }
    .favr-header__logo-text { display: none; }
    .favr-header__nav { display: none; }
    .favr-header__burger { display: flex; }
  }
</style>
