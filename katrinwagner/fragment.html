<style>
  /* =============================================
     FAVR Header Fragment – Brillenatelier Katrin Wagner (Stuttgart)
     Weiß, dezent, Frame-Höhe 200px
     Links: Burger+Menü / Suche (gestapelt)
     Mitte: BRILLEN – Ringe-Icon – ATELIER, dahinter rotierter Schriftzug "Katrin Wagner"
     Rechts: Termin buchen / Virtual Try On / Atelierpost (gestapelt, rechtsbündig)
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(20,19,18,0.35); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; max-width: 86vw; height: 100vh;
    background: #ffffff;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.14);
    transition: right 0.28s ease;
    font-family: 'TT Firs Neue', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid rgba(20,19,18,0.1); flex-shrink: 0;
  }
  .favr-drawer__logo-img { height: 42px; width: auto; display: block; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s; flex-shrink: 0;
  }
  .favr-drawer__close:hover { background: rgba(20,19,18,0.06); }
  .favr-drawer__close svg {
    width: 18px; height: 18px; fill: none; stroke: #141312;
    stroke-width: 1.6; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #141312; text-decoration: none;
    font-size: 15px; letter-spacing: 0.04em; padding: 15px 22px;
    border-bottom: 1px solid rgba(20,19,18,0.08);
    font-weight: 400; transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(205,161,150,0.12); }
  .favr-drawer__cta { padding: 18px 22px; margin-top: auto; border-top: 1px solid rgba(20,19,18,0.1); }
  .favr-drawer__cta a {
    display: block; text-align: center; text-decoration: none;
    border: 1px solid #cda196; color: #141312; font-size: 12px; font-weight: 400;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 12px 14px;
  }

  /* Header */
  .favr-header {
    width: 100%; height: 200px; background: #ffffff;
    font-family: 'TT Firs Neue', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-header__inner {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; padding: 0 56px;
  }

  /* Links: Menü + Suche gestapelt */
  .favr-header__left { display: flex; flex-direction: column; gap: 18px; flex: 1 1 0; min-width: 0; }
  .favr-header__trigger { display: inline-flex; align-items: center; gap: 12px; cursor: pointer; width: fit-content; }
  .favr-header__burger { display: flex; flex-direction: column; gap: 4px; width: 22px; flex-shrink: 0; }
  .favr-header__burger span { display: block; height: 1.4px; width: 100%; background: #141312; }
  .favr-header__trigger-label { font-size: 16px; font-weight: 400; color: #141312; }


  /* Mitte: Logo-Komposition */
  .favr-header__logo {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
    text-decoration: none; height: 100%;
  }
  .favr-header__logo-img { height: 170px; width: auto; display: block; }

  /* Rechts: gestapelte Links */
  .favr-header__right { flex: 1 1 0; display: flex; flex-direction: column; align-items: flex-end; gap: 16px; }
  .favr-header__right a {
    display: inline-flex; align-items: center; gap: 8px;
    color: #141312; text-decoration: none;
    font-size: 13px; font-weight: 400; letter-spacing: 0.16em; text-transform: uppercase;
    white-space: nowrap; padding-bottom: 5px;
    border-bottom: 1px solid #cda196;
    transition: opacity 0.15s;
  }
  .favr-header__right a:hover { opacity: 0.6; }
  .favr-header__right a svg { width: 14px; height: 14px; flex-shrink: 0; }

  .favr-header__burger-mobile { display: none; }

  /* ===== Breakpoint 1: <1100px – rechte Links + Suche ausblenden, Burger übernimmt alles ===== */
  @media (max-width: 1100px) {
    .favr-header__right { display: none; }
    .favr-header__inner { padding: 0 24px; }
    .favr-header__logo-img { height: 100px; }
  }

  /* ===== Breakpoint 2: <560px – kompakt ===== */
  @media (max-width: 560px) {
    .favr-header { height: 120px; }
    .favr-header__inner { padding: 0 16px; }
    .favr-header__trigger-label { display: none; }
    .favr-header__logo-img { height: 66px; }
  }
</style>
