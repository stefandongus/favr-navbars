<style>
  /* =============================================
     FAVR Header Fragment – Vandenbalck Eyewear (Leuven)
     Ecru/Terrakotta, Info-Bar + Hauptnav
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(60,30,28,0.35); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; max-width: 86vw; height: 100vh;
    background: #E8E7D5;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.16);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border-bottom: 1px solid rgba(180,88,86,0.25); flex-shrink: 0;
  }
  .favr-drawer__logo-img { height: 32px; width: auto; display: block; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s; flex-shrink: 0;
  }
  .favr-drawer__close:hover { background: rgba(180,88,86,0.1); }
  .favr-drawer__close svg {
    width: 18px; height: 18px; fill: none; stroke: #B45856;
    stroke-width: 1.6; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #B45856; text-decoration: none;
    font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(180,88,86,0.15);
    font-weight: 400; transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(180,88,86,0.08); }
  .favr-drawer__nav a.favr-strong { font-weight: 700; }
  .favr-drawer__cta { padding: 16px 20px; margin-top: auto; }
  .favr-drawer__cta a {
    display: block; text-align: center; text-decoration: none;
    border: 1px solid #B45856; color: #B45856; font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 12px 14px;
  }

  /* Info-Bar */
  .favr-infobar { width: 100%; background: #E8E7D5; border-bottom: 1px solid rgba(180,88,86,0.2); }
  .favr-infobar__inner {
    width: 100%; margin: 0;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    gap: 20px; padding: 10px 40px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-infobar__left { justify-self: start; }
  .favr-infobar__center { justify-self: center; }
  .favr-infobar__right { justify-self: end; }
  .favr-infobar__inner a {
    display: inline-flex; align-items: center; gap: 6px;
    color: #B45856; text-decoration: none;
    font-size: 12px; font-weight: 400; white-space: nowrap;
  }
  .favr-infobar__inner a svg { width: 24px; height: 12px; flex-shrink: 0; }
  .favr-infobar__inner a:hover { opacity: 0.75; }
  .favr-infobar__center a, .favr-infobar__right a {
    font-size: 15px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
  }

  /* Hauptnav */
  .favr-header { width: 100%; background: #E8E7D5; }
  .favr-header__inner {
    width: 100%; margin: 0;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    gap: 24px; padding: 22px 40px;
  }
  .favr-header__logo { display: block; text-decoration: none; justify-self: start; }
  .favr-header__logo-img { height: 96px; width: auto; display: block; }

  .favr-header__nav { display: flex; align-items: center; gap: 26px; justify-self: center; }
  .favr-header__nav a {
    color: #B45856; text-decoration: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 13px; font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase;
    white-space: nowrap; transition: opacity 0.15s;
  }
  .favr-header__nav a:hover { opacity: 0.65; }
  .favr-header__nav a.favr-strong { font-weight: 700; }

  .favr-header__burger {
    display: none; cursor: pointer; justify-self: end;
    width: 26px; height: 18px; flex-direction: column;
    justify-content: space-between; flex-shrink: 0;
  }
  .favr-header__burger span { display: block; height: 1.5px; width: 100%; background: #B45856; }

  /* ===== Breakpoint 1: <1050px – Hauptnav zu Burger ===== */
  @media (max-width: 1050px) {
    .favr-header__nav { display: none; }
    .favr-header__burger { display: flex; }
    .favr-header__inner { padding: 18px 24px; }
    .favr-header__logo-img { height: 75px; }
    .favr-infobar__inner { padding: 8px 24px; }
  }

  /* ===== Breakpoint 2: <640px – kompakt ===== */
  @media (max-width: 640px) {
    .favr-infobar__inner a span.favr-infobar-label { display: none; }
    .favr-infobar__inner { gap: 10px; padding: 8px 16px; }
    .favr-header__inner { padding: 14px 16px; }
    .favr-header__logo-img { height: 55px; }
  }
</style>
