<style>
  /* =============================================
     FAVR Header Fragment – Richtig Kühn! Jena
     Goldverlauf, zweistufig responsive
     Stufe 1 (<1400px): Nav 2-zeilig
     Stufe 2 (<1200px): nur Logo + Hamburger
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; height: 100vh;
    background: linear-gradient(to right, #e8cc40 0%, #fff5a0 50%, #e8cc40 100%);
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.2);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid rgba(0,0,0,0.15); flex-shrink: 0;
  }
  .favr-drawer__head img { height: 50px; width: auto; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: rgba(0,0,0,0.1); }
  .favr-drawer__close svg {
    width: 20px; height: 20px; fill: none; stroke: #1a1a1a;
    stroke-width: 2; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #1a1a1a; text-decoration: none;
    font-size: 15px; padding: 13px 22px;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-weight: 600; letter-spacing: 0.03em; transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(0,0,0,0.08); }
  .favr-drawer__footer {
    padding: 20px 22px; font-size: 13px; color: #333;
    line-height: 1.75; border-top: 1px solid rgba(0,0,0,0.15); margin-top: auto;
  }
  .favr-drawer__footer strong { color: #1a1a1a; display: block; margin-bottom: 4px; }
  .favr-drawer__footer a { color: #7a1a1a; text-decoration: none; }

  /* Header */
  .favr-header {
    display: block; width: 100%;
    background: linear-gradient(to right, #e8cc40 0%, #fff5a0 50%, #e8cc40 100%);
    position: sticky; top: 0; z-index: 1000;
    border-bottom: 2px solid rgba(0,0,0,0.1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  .favr-header__inner {
    display: flex; flex-direction: row; align-items: flex-start;
    width: 100%; height: 180px; padding: 36px 24px 0; gap: 16px;
  }

  .favr-header__logo {
    display: flex; align-items: flex-start;
    text-decoration: none; flex: 0 0 auto;
  }
  .favr-header__logo img { height: 120px; width: auto; display: block; }

  .favr-header__nav {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 0; flex: 1 1 auto; justify-content: center;
  }
  .favr-header__nav a {
    color: #1a1a1a; text-decoration: none;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 14px; white-space: nowrap; transition: opacity 0.15s;
  }
  .favr-header__nav a:hover { opacity: 0.65; }

  .favr-header__vto {
    color: #1a1a1a; text-decoration: none;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    white-space: nowrap; transition: opacity 0.15s;
    flex: 0 0 auto; padding: 0 32px;
  }
  .favr-header__vto:hover { opacity: 0.65; }

  .favr-header__right {
    display: flex; align-items: flex-start; gap: 12px; flex: 0 0 auto;
  }

  .favr-header__termin {
    display: inline-flex; align-items: center;
    padding: 16px 22px; border-radius: 2px;
    background: #7a1a1a; color: #ffffff;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    text-decoration: none; white-space: nowrap; margin-right: 16px;
    transition: background 0.15s;
  }
  .favr-header__termin:hover { background: #601010; }

  .favr-header__burger {
    display: none; align-items: center; justify-content: center;
    cursor: pointer; width: 36px; height: 36px;
    flex-shrink: 0; background: none; border: none; padding: 0;
  }
  .favr-header__burger svg {
    width: 24px; height: 24px; fill: none;
    stroke: #1a1a1a; stroke-width: 2; stroke-linecap: round;
  }

  /* Stufe 1: 1201–1400px — Nav kompakt, 2 Zeilen */
  @media (min-width: 1201px) and (max-width: 1400px) {
    .favr-header__nav { flex-wrap: wrap; justify-content: center; row-gap: 4px; }
    .favr-header__nav a { font-size: 11px; padding: 2px 8px; }
    .favr-header__vto { font-size: 11px; padding: 0 16px; }
  }

  /* Stufe 2: unter 1200px — nur Logo + Hamburger */
  @media (max-width: 1200px) {
    .favr-header__inner {
      height: 90px; padding: 0 20px;
      align-items: center; justify-content: space-between;
    }
    .favr-header__logo img { height: 64px; }
    .favr-header__nav { display: none; }
    .favr-header__vto { display: none; }
    .favr-header__right { display: none; }
    .favr-header__burger { display: flex; }
  }
</style>
