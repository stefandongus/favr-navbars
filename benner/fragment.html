  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  #favr-burger-toggle { display: none; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; height: 100vh; background: #ffffff;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    transition: right 0.28s ease;
    font-family: 'Alatsi', sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
  }
  .favr-drawer__head img { height: 36px; width: auto; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: #f5f5f5; }
  .favr-drawer__close svg {
    width: 20px; height: 20px; fill: none; stroke: #1a1a1a;
    stroke-width: 2; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #1a1a1a; text-decoration: none;
    font-size: 13px; font-weight: 400; padding: 12px 22px;
    border-bottom: 1px solid #f5f5f5;
    font-family: 'Alatsi', sans-serif; text-transform: uppercase;
    letter-spacing: 0.05em; transition: color 0.12s;
  }
  .favr-drawer__nav a:hover { color: #555; }
  .favr-drawer__sub-link {
    font-size: 11px !important; padding: 9px 22px 9px 36px !important;
    color: #666 !important; text-transform: none !important;
  }
  .favr-drawer__divider { height: 1px; background: #f0f0f0; }

  /* ── Header ── */
  .favr-header {
    display: block; width: 100%;
    background: #ffffff;
    border-bottom: 1px solid #f0f0f0;
    position: sticky; top: 0; z-index: 1000;
    font-family: 'Alatsi', sans-serif;
  }

  .favr-header__inner {
    display: flex; flex-direction: row; align-items: center;
    width: 100%; height: 96px; padding: 0 32px;
  }

  .favr-header__logo {
    display: flex; align-items: center;
    text-decoration: none; flex: 0 0 auto;
  }
  .favr-header__logo img { height: 50px; width: auto; display: block; }

  /* Nav mittig */
  .favr-header__nav {
    display: flex; align-items: center;
    flex: 1 1 auto; justify-content: center; gap: 0;
  }

  .favr-nav-item { position: relative; }

  .favr-nav-item > a {
    display: flex; align-items: center; gap: 4px;
    color: #1a1a1a; text-decoration: none;
    font-size: 14px; font-weight: 400;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 0 16px; height: 96px; white-space: nowrap;
    transition: color 0.15s;
    font-family: 'Alatsi', sans-serif;
  }
  .favr-nav-item > a:hover { color: #555; }

  /* Try-On special style */
  .favr-tryon > a { color: #444; }

  /* Dropdown arrow */
  .favr-nav-arrow {
    width: 0; height: 0;
    border-left: 3px solid transparent;
    border-right: 3px solid transparent;
    border-top: 4px solid #888;
    transition: transform 0.2s;
    margin-top: 1px;
  }
  .favr-nav-item:hover .favr-nav-arrow { transform: rotate(180deg); }

  /* Dropdown panel */
  .favr-dropdown {
    display: none;
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    background: #ffffff;
    min-width: 200px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    border-top: none;
    z-index: 100;
  }
  .favr-nav-item:hover .favr-dropdown { display: block; }
  .favr-dropdown a {
    display: block; color: #444; text-decoration: none;
    font-size: 12px; font-weight: 400; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 12px 20px;
    border-bottom: 1px solid #f5f5f5;
    font-family: 'Alatsi', sans-serif;
    transition: background 0.12s, color 0.12s;
  }
  .favr-dropdown a:last-child { border-bottom: none; }
  .favr-dropdown a:hover { background: #f8f8f8; color: #1a1a1a; }

  /* Burger */
  .favr-header__burger {
    display: none; align-items: center; justify-content: center;
    cursor: pointer; width: 36px; height: 36px;
    flex-shrink: 0; background: none; border: none; padding: 0;
  }
  .favr-header__burger svg {
    width: 22px; height: 22px; fill: none;
    stroke: #1a1a1a; stroke-width: 1.5; stroke-linecap: round;
  }

  @media (max-width: 900px) {
    .favr-header__inner { height: 100px; padding: 0 20px; position: relative; justify-content: center; }
    .favr-header__logo { position: absolute; left: 50%; transform: translateX(-50%); }
    .favr-header__logo img { height: 50px; }
    .favr-header__nav { display: none; }
    .favr-header__burger { display: flex; position: absolute; left: 20px; top: 50%; transform: translateY(-50%); }
  }
</style>
