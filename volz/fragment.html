<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; height: 100vh; background: #ffffff;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.13);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
  }
  .favr-drawer__head img { height: 32px; width: auto; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: #f5f5f5; }
  .favr-drawer__close svg {
    width: 20px; height: 20px; fill: none; stroke: #1a1a1a;
    stroke-width: 2; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #1a1a1a; text-decoration: none;
    font-size: 15px; padding: 14px 22px; border-bottom: 1px solid #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    transition: color 0.12s, background 0.12s;
  }
  .favr-drawer__nav a:hover { color: #f0b429; background: #fafafa; }
  .favr-drawer__divider {
    height: 1px; background: #e8e8e8; margin: 8px 22px;
  }
  .favr-drawer__section-label {
    font-size: 13px; color: #999; font-weight: 500;
    letter-spacing: 0.04em; padding: 12px 22px 4px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__footer {
    padding: 20px 22px; font-size: 13px; color: #777;
    line-height: 1.75; border-top: 1px solid #f0f0f0; margin-top: auto;
  }
  .favr-drawer__footer strong { color: #333; display: block; margin-bottom: 4px; }
  .favr-drawer__footer a { color: #f0b429; text-decoration: none; }
  .favr-drawer__footer a:hover { text-decoration: underline; }

  /* ── Header ──
     Original: row padding-top/bottom 21px, Logo natural 121×479px
     Bei max-width 1080px erscheint Logo ca. 240px breit → Höhe ~61px
     Header gesamt: 61px Logo + 21px*2 padding = ~103px + border ≈ 119px
     Wir nehmen 160px für mehr Weißraum wie im Screenshot zu sehen
  */
  .favr-header {
    display: block; width: 100%; background: #ffffff;
    border-bottom: 1px solid #efefef;
    position: sticky; top: 0; z-index: 1000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  .favr-header__inner {
    display: flex; flex-direction: row;
    align-items: center; justify-content: space-between;
    max-width: 1080px; margin: 0 auto;
    padding: 42px 30px;
  }

  .favr-header__logo {
    display: flex; align-items: center;
    text-decoration: none; flex: 0 0 auto;
  }
  .favr-header__logo img {
    height: 56px;
    width: auto; display: block;
  }

  .favr-header__right {
    display: flex; align-items: center; flex: 0 0 auto;
  }

  .favr-header__burger {
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; width: 44px; height: 44px; flex-shrink: 0;
  }
  .favr-header__burger svg {
    width: 28px; height: 28px; fill: none;
    stroke: #1a1a1a; stroke-width: 1.8; stroke-linecap: round;
  }
  .favr-header__burger:hover svg { stroke: #f0b429; }

  @media (max-width: 768px) {
    .favr-header__inner { padding: 18px 20px; }
    .favr-header__logo img { height: 44px; }
  }
</style>
