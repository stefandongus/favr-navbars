<style>
  /* =============================================
     FAVR Header Fragment – Atelier Valentin Paris
     Schwarz/Gold, Frame-Höhe 180px
     Logo+Tagline links, Nav+Flagge rechts oben, zweite Tagline rechts unten
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; max-width: 86vw; height: 100vh;
    background: #0a0a0a;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 28px rgba(0,0,0,0.5);
    transition: right 0.28s ease;
    font-family: Georgia, 'Times New Roman', serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border-bottom: 1px solid rgba(140,118,85,0.25); flex-shrink: 0;
  }
  .favr-drawer__logo-img { height: 34px; width: auto; display: block; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s; flex-shrink: 0;
  }
  .favr-drawer__close:hover { background: rgba(140,118,85,0.12); }
  .favr-drawer__close svg {
    width: 18px; height: 18px; fill: none; stroke: #8C7655;
    stroke-width: 1.6; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #c9b795; text-decoration: none;
    font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(140,118,85,0.18);
    font-weight: 400; transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(140,118,85,0.08); }
  .favr-drawer__cta { padding: 16px 20px; margin-top: auto; border-top: 1px solid rgba(140,118,85,0.25); }
  .favr-drawer__cta a {
    display: block; text-align: center; text-decoration: none;
    border: 1px solid #8C7655; color: #c9b795; font-size: 12px; font-weight: 400;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 12px 14px;
  }

  /* Header */
  .favr-header {
    width: 100%; min-height: 180px; background: #000000;
    font-family: Georgia, 'Times New Roman', serif;
    display: flex; flex-direction: column; justify-content: center;
  }
  .favr-header__inner {
    width: 100%; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; padding: 24px 48px 0;
  }
  .favr-header__brand { display: flex; flex-direction: column; gap: 8px; flex: 0 0 auto; }
  .favr-header__logo { display: block; text-decoration: none; }
  .favr-header__logo-img { height: 92px; width: auto; display: block; }
  .favr-header__tagline-left {
    font-size: 13px; font-weight: 400; color: #c9b795;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    white-space: nowrap;
  }

  .favr-header__nav { display: flex; align-items: center; gap: 26px; }
  .favr-header__nav-links { display: flex; align-items: center; gap: 40px; }
  .favr-header__nav a {
    color: #c9b795; text-decoration: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 12px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase;
    white-space: nowrap; transition: opacity 0.15s;
  }
  .favr-header__nav a:hover { opacity: 0.65; }
  .favr-header__flag { font-size: 18px; line-height: 1; }

  .favr-header__bottom {
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 10px 48px 18px;
  }
  .favr-header__tagline-right {
    font-size: 13px; font-weight: 400; color: #c9b795;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    white-space: nowrap; margin-left: auto;
  }

  .favr-header__burger {
    display: none; cursor: pointer;
    width: 24px; height: 16px; flex-direction: column;
    justify-content: space-between; flex-shrink: 0;
  }
  .favr-header__burger span { display: block; height: 1.5px; width: 100%; background: #c9b795; }

  /* ===== Breakpoint 1: <1000px – Nav zu Burger ===== */
  @media (max-width: 1000px) {
    .favr-header__nav-links { display: none; }
    .favr-header__burger { display: flex; }
    .favr-header__inner { padding: 20px 24px 0; }
    .favr-header__bottom { padding: 8px 24px 14px; }
  }

  /* ===== Breakpoint 2: <560px – kompakt ===== */
  @media (max-width: 560px) {
    .favr-header { min-height: 130px; }
    .favr-header__logo-img { height: 68px; }
    .favr-header__inner { padding: 16px 18px 0; }
    .favr-header__bottom { padding: 6px 18px 12px; }
    .favr-header__tagline-left, .favr-header__tagline-right { font-size: 11px; }
  }
</style>
