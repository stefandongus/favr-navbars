<style>
  /* =============================================
     FAVR Header Fragment – Augenoptik Hensler
     Für Agentur: kein JS, kein <html>/<head>/<body>
     Burger via CSS-Checkbox, Shadow DOM-ready
     ============================================= */

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  #favr-burger-toggle { display: none; }

  /* Overlay */
  .favr-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 2000;
    cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Slide-in Drawer */
  .favr-drawer {
    position: fixed;
    top: 0;
    right: -320px;
    width: 300px;
    height: 100vh;
    background: #ffffff;
    z-index: 2001;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    box-shadow: -4px 0 24px rgba(0,0,0,0.13);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  .favr-drawer__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }
  .favr-drawer__head img { height: 36px; width: auto; }

  .favr-drawer__close {
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: #fdf5f5; }
  .favr-drawer__close svg {
    width: 20px; height: 20px;
    fill: none; stroke: #c0392b;
    stroke-width: 2; stroke-linecap: round;
  }

  .favr-drawer__nav a {
    display: block;
    color: #1a1a1a;
    text-decoration: none;
    font-size: 15px;
    padding: 14px 22px;
    border-bottom: 1px solid #f5f5f5;
    transition: color 0.12s, background 0.12s;
  }
  .favr-drawer__nav a:hover { color: #c0392b; background: #fdf5f5; }

  .favr-drawer__footer {
    padding: 20px 22px;
    font-size: 13px;
    color: #777;
    line-height: 1.75;
    border-top: 1px solid #f0f0f0;
    margin-top: auto;
  }
  .favr-drawer__footer strong { color: #333; display: block; margin-bottom: 4px; }
  .favr-drawer__footer a { color: #c0392b; text-decoration: none; }
  .favr-drawer__footer a:hover { text-decoration: underline; }

  /* Header */
  .favr-header {
    display: block;
    width: 100%;
    background: #ffffff;
    border-bottom: 1px solid #e8e8e8;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    position: sticky;
    top: 0;
    z-index: 1000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  .favr-header__inner {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    height: 90px;
    padding: 0 16px 0 32px;
  }

  .favr-header__logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    flex: 0 0 auto;
  }
  .favr-header__logo img {
    height: 60px;
    width: auto;
    display: block;
  }

  .favr-header__right {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    flex: 0 0 auto;
  }

  .favr-header__icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #c0392b;
    text-decoration: none;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .favr-header__icon:hover { background: #c0392b; }
  .favr-header__icon svg {
    width: 17px; height: 17px;
    fill: none; stroke: #c0392b;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    transition: stroke 0.15s;
  }
  .favr-header__icon:hover svg { stroke: #ffffff; }
  .favr-ig-dot { fill: #c0392b; stroke: none; transition: fill 0.15s; }
  .favr-header__icon:hover .favr-ig-dot { fill: #ffffff; }

  .favr-header__sep {
    width: 1px;
    height: 24px;
    background: #ddd;
    margin: 0 4px;
    flex-shrink: 0;
  }

  .favr-header__burger {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: #c0392b;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    user-select: none;
    flex-shrink: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-header__burger:hover { opacity: 0.75; }
  .favr-header__burger svg {
    width: 24px; height: 24px;
    fill: none; stroke: #c0392b;
    stroke-width: 2; stroke-linecap: round;
  }

  /* Mobile */
  @media (max-width: 768px) {
    .favr-header__inner { height: 64px; padding: 0 16px; }
    .favr-header__logo img { height: 40px; }
    .favr-header__sep,
    .favr-header__icon { display: none; }
    .favr-header__right { gap: 6px; }
  }
</style>
