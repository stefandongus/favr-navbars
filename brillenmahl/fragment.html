<style>
  /* =============================================
     FAVR Header Fragment – Brillen Mahl (Lebach)
     Creme-Hintergrund, Frame-Höhe 170px
     Logo (gestapelt) links, Nav-Links + Termin-Buchen-Button rechts
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(20,16,12,0.4); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; max-width: 86vw; height: 100vh;
    background: #f6f1eb;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.18);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border-bottom: 1px solid rgba(20,16,12,0.12); flex-shrink: 0;
  }
  .favr-drawer__logo-img { height: 44px; width: auto; display: block; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s; flex-shrink: 0;
  }
  .favr-drawer__close:hover { background: rgba(20,16,12,0.06); }
  .favr-drawer__close svg {
    width: 18px; height: 18px; fill: none; stroke: #171412;
    stroke-width: 1.8; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #171412; text-decoration: none;
    font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 15px 20px;
    border-bottom: 1px solid rgba(20,16,12,0.08);
    font-weight: 600; transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(184,115,90,0.1); }
  .favr-drawer__cta { padding: 16px 20px; margin-top: auto; }
  .favr-drawer__cta a {
    display: block; text-align: center; text-decoration: none;
    background: #B8735A; color: #ffffff; font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 13px 14px;
  }

  /* Info-Bar */
  .favr-infobar { width: 100%; height: 28px; background: #304950; }
  .favr-infobar__inner {
    height: 100%; display: flex; align-items: center; justify-content: center;
    gap: 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-infobar__inner a {
    color: #f0ede8; text-decoration: none;
    font-size: 11px; font-weight: 300; white-space: nowrap;
  }
  .favr-infobar__inner a:hover { opacity: 0.8; }

  /* Header */
  .favr-header {
    width: 100%; min-height: 200px; background: #f6f1eb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-header__inner {
    width: 100%; height: 200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; padding: 22px 48px 0;
  }

  .favr-header__logo { flex: 0 0 auto; display: flex; align-items: center; padding-left: 32px; }
  .favr-header__logo-img { height: 150px; width: auto; display: block; }

  .favr-header__right { display: flex; align-items: center; gap: 34px; flex: 0 0 auto; }
  .favr-header__nav { display: flex; align-items: center; gap: 30px; }
  .favr-header__nav a {
    color: #171412; text-decoration: none;
    font-size: 11px; font-weight: 300; letter-spacing: 0.07em; text-transform: uppercase;
    white-space: nowrap; transition: opacity 0.15s;
  }
  .favr-header__nav a:hover { opacity: 0.6; }

  .favr-header__cta {
    display: inline-block; text-decoration: none;
    background: #B8735A; color: #ffffff;
    font-size: 11px; font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase;
    white-space: nowrap; padding: 15px 26px; transition: background 0.15s;
  }
  .favr-header__cta:hover { background: #a3634c; }

  .favr-header__burger {
    display: none; cursor: pointer;
    width: 26px; height: 18px; flex-direction: column;
    justify-content: space-between; flex-shrink: 0;
  }
  .favr-header__burger span { display: block; height: 2px; width: 100%; background: #171412; }

  /* ===== Breakpoint 1: <1000px – Nav-Links zu Burger, CTA bleibt ===== */
  @media (max-width: 1000px) {
    .favr-header__nav { display: none; }
    .favr-header__burger { display: flex; }
    .favr-header__inner { padding: 0 24px; }
    .favr-header__logo-img { height: 110px; }
    .favr-header__right { gap: 20px; }
  }

  /* ===== Breakpoint 2: <560px – kompakt ===== */
  @media (max-width: 560px) {
    .favr-header, .favr-header__inner { min-height: 100px; height: 100px; }
    .favr-header__inner { padding: 0 16px; }
    .favr-header__logo-img { height: 78px; }
    .favr-header__cta { font-size: 11px; padding: 11px 16px; }
    .favr-header__right { gap: 14px; }
  }
</style>
