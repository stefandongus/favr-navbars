<style>
  /* =============================================
     FAVR Header Fragment – LOTHUS optic (München)
     Beige-Hintergrund (#E7E1D5), Höhe 110px
     Gradient-Pills für Virtual Try On / Termine
     Burger öffnet Fullscreen-Dark-Drawer
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }

  /* Drawer: rechtes Fünftel */
  .favr-drawer {
    position: fixed; top: 0; right: 0; width: 20%; min-width: 280px;
    height: 100vh;
    background: #0d0d0d;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    box-shadow: -6px 0 30px rgba(0,0,0,0.4);
  }
  #favr-burger-toggle:checked ~ .favr-drawer { transform: translateX(0); }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 20px 20px 10px;
  }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; flex-shrink: 0;
  }
  .favr-drawer__close svg { width: 26px; height: 26px; fill: none; stroke: #ffffff; stroke-width: 2; stroke-linecap: round; }

  .favr-drawer__nav { flex: 1 1 auto; padding: 20px 28px; display: flex; flex-direction: column; gap: 24px; }
  .favr-drawer__nav a {
    color: #ffffff; text-decoration: none; font-size: 22px; font-weight: 700;
  }
  .favr-drawer__nav a.favr-muted { color: #6b6b6b; }
  .favr-drawer__nav a:hover { opacity: 0.75; }

  .favr-drawer__bottom { padding: 10px 32px 36px; display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .favr-drawer__flag {
    border: 1px solid #4a4a4a; padding: 8px 22px; font-size: 20px; line-height: 1;
  }
  .favr-drawer__social { display: flex; gap: 26px; }
  .favr-drawer__social svg { width: 22px; height: 22px; fill: #ffffff; }

  /* Header */
  .favr-header { width: 100%; min-height: 110px; background: #E7E1D5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
  .favr-header__inner {
    width: 100%; min-height: 110px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; padding: 10px 40px;
  }
  .favr-header__logo { display: block; text-decoration: none; flex: 0 0 auto; }
  .favr-header__logo-img { height: 96px; width: auto; display: block; }

  .favr-header__right { display: flex; align-items: center; gap: 22px; }

  .favr-pill {
    display: inline-flex; align-items: center; justify-content: center;
    text-decoration: none; color: #1a1a1a;
    font-size: 16px; font-weight: 400; letter-spacing: 0.08em; white-space: nowrap;
    width: 185px; height: 70px; border-radius: 999px;
    background: linear-gradient(90deg, #B487CA 0%, #F1D2CD 55%, #CDBBD7 100%);
    transition: opacity 0.15s;
  }
  .favr-pill:hover { opacity: 0.85; }

  .favr-header__burger {
    display: flex; cursor: pointer;
    width: 24px; height: 16px; flex-direction: column;
    justify-content: space-between; flex-shrink: 0;
  }
  .favr-header__burger span { display: block; height: 1.6px; width: 100%; background: #1a1a1a; }

  /* ===== Breakpoint 1: <1000px – Pills/Login/Sprache ausblenden ===== */
  @media (max-width: 1000px) {
    .favr-pill { display: none; }
    .favr-header__inner { padding: 10px 24px; }
  }

  /* ===== Breakpoint 2: <560px – kompakt ===== */
  @media (max-width: 560px) {
    .favr-header, .favr-header__inner { min-height: 76px; }
    .favr-header__inner { padding: 8px 16px; gap: 12px; }
    .favr-header__logo-img { height: 68px; }
    .favr-header__right { gap: 14px; }
    .favr-drawer__nav a { font-size: 20px; }
    .favr-drawer__nav { gap: 22px; padding: 20px 22px; }
  }
</style>
