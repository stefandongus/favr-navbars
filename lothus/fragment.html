<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  #favr-burger-toggle { display: none; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; height: 100vh;
    background-color: #ddd8ce;
    background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSc0MDAnIGhlaWdodD0nNDAwJz4KICA8ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC43NScgbnVtT2N0YXZlcz0nNCcgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjxmZUNvbG9yTWF0cml4IHR5cGU9J3NhdHVyYXRlJyB2YWx1ZXM9JzAnLz48L2ZpbHRlcj4KICA8cmVjdCB3aWR0aD0nNDAwJyBoZWlnaHQ9JzQwMCcgZmlsdGVyPSd1cmwoI24pJyBvcGFjaXR5PScwLjEyJy8+Cjwvc3ZnPg==");
    background-size: 400px 400px;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.13);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0;
  }
  .favr-drawer__head img { height: 50px; width: auto; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: rgba(0,0,0,0.08); }
  .favr-drawer__close svg {
    width: 20px; height: 20px; fill: none; stroke: #1a1a1a;
    stroke-width: 2; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #1a1a1a; text-decoration: none;
    font-size: 15px; padding: 14px 22px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(0,0,0,0.05); }
  .favr-drawer__footer {
    padding: 20px 22px; font-size: 13px; color: #555;
    line-height: 1.75; border-top: 1px solid rgba(0,0,0,0.1); margin-top: auto;
  }
  .favr-drawer__footer strong { color: #1a1a1a; display: block; margin-bottom: 4px; }
  .favr-drawer__footer a { color: #7c5cbf; text-decoration: none; }
  .favr-drawer__footer a:hover { text-decoration: underline; }

  /* ── Header: Leinwand-Farbe #d8d3c8 + SVG-Körnung ── */
  .favr-header {
    display: block; width: 100%;
    background-color: #d8d3c8;
    background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSc0MDAnIGhlaWdodD0nNDAwJz4KICA8ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC43NScgbnVtT2N0YXZlcz0nNCcgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjxmZUNvbG9yTWF0cml4IHR5cGU9J3NhdHVyYXRlJyB2YWx1ZXM9JzAnLz48L2ZpbHRlcj4KICA8cmVjdCB3aWR0aD0nNDAwJyBoZWlnaHQ9JzQwMCcgZmlsdGVyPSd1cmwoI24pJyBvcGFjaXR5PScwLjEyJy8+Cjwvc3ZnPg==");
    background-size: 400px 400px;
    position: sticky; top: 0; z-index: 1000;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }

  .favr-header__inner {
    display: flex; flex-direction: row;
    align-items: center; justify-content: space-between;
    width: 100%; height: 100px; padding: 0 32px;
  }

  .favr-header__logo {
    display: flex; align-items: center;
    text-decoration: none; flex: 0 0 auto;
  }
  .favr-header__logo img { height: 80px; width: auto; display: block; }

  .favr-header__right {
    display: flex; align-items: center;
    gap: 10px; flex: 0 0 auto;
  }

  .favr-header__pill {
    display: inline-flex; align-items: center;
    padding: 14px 34px; border-radius: 999px;
    font-size: 17px; font-weight: 400;
    text-decoration: none; white-space: nowrap;
    transition: opacity 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-header__pill:hover { opacity: 0.8; }
  .favr-header__pill--try {
    background: linear-gradient(105deg, #c4a0d8 0%, #e08ab0 45%, #f0b898 100%);
    color: #3a1060;
  }
  .favr-header__pill--termin {
    background: linear-gradient(105deg, #c4a0d8 0%, #e08ab0 45%, #f0b898 100%);
    color: #3a1060;
  }

  .favr-header__anmelden {
    font-size: 12px; color: #333; text-decoration: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    white-space: nowrap; transition: color 0.12s;
  }
  .favr-header__anmelden:hover { color: #7c5cbf; }

  .favr-header__lang {
    display: flex; align-items: center; gap: 1px;
    font-size: 12px; color: #333;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-header__lang a {
    color: #333; text-decoration: none; padding: 2px 3px;
    transition: color 0.12s;
  }
  .favr-header__lang a:hover { color: #7c5cbf; }
  .favr-header__lang span { color: #999; font-size: 11px; margin: 0 1px; }

  .favr-header__cart {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; text-decoration: none;
    color: #333; position: relative; transition: color 0.15s;
  }
  .favr-header__cart:hover { color: #7c5cbf; }
  .favr-header__cart svg {
    width: 20px; height: 20px; fill: none;
    stroke: currentColor; stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .favr-header__cart-count {
    position: absolute; top: 1px; right: 1px;
    background: #7c5cbf; color: white; font-size: 9px; font-weight: 700;
    width: 14px; height: 14px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .favr-header__burger {
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; width: 34px; height: 34px; flex-shrink: 0;
  }
  .favr-header__burger svg {
    width: 22px; height: 22px; fill: none;
    stroke: #1a1a1a; stroke-width: 1.8; stroke-linecap: round;
  }
  .favr-header__burger:hover svg { stroke: #7c5cbf; }

  @media (max-width: 768px) {
    .favr-header__inner { height: 60px; padding: 0 16px; }
    .favr-header__logo img { height: 28px; }
    .favr-header__pill, .favr-header__lang, .favr-header__anmelden { display: none; }
  }
</style>
