<style>
  /* =============================================
     FAVR Header Fragment – Brillerei (Bern/Riggisberg/Köniz)
     Weiß, Schwarz-Text, Salbeigrün-Akzent (#7C9B6A)
     Dropdown bei "Brillen"
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -300px;
    width: 280px; max-width: 86vw; height: 100vh;
    background: #ffffff;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.16);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0;
  }
  .favr-drawer__logo-img { height: 26px; width: auto; display: block; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 30px; height: 30px;
    border-radius: 50%; transition: background 0.12s; flex-shrink: 0;
  }
  .favr-drawer__close:hover { background: rgba(0,0,0,0.06); }
  .favr-drawer__close svg {
    width: 17px; height: 17px; fill: none; stroke: #111111;
    stroke-width: 1.8; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #111111; text-decoration: none;
    font-size: 14px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase;
    padding: 13px 18px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(124,155,106,0.1); }
  .favr-drawer__sublist a {
    padding-left: 32px; font-size: 13px; font-weight: 500; color: #3a3a3a;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  /* Header */
  .favr-header { width: 100%; background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
  .favr-header__inner {
    width: 100%; margin: 0 auto;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    gap: 24px; padding: 22px 40px;
  }
  .favr-header__logo { display: block; text-decoration: none; justify-self: start; grid-column: 1; }
  .favr-header__logo-img { height: 90px; width: auto; display: block; }

  .favr-header__nav { display: flex; align-items: center; gap: 26px; justify-self: center; padding-top: 60px; grid-column: 2; }
  .favr-header__nav a {
    color: #111111; text-decoration: none;
    font-size: 20px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase;
    white-space: nowrap; transition: opacity 0.15s;
  }
  .favr-header__nav a:hover { opacity: 0.6; }

  .favr-header__actions { display: flex; align-items: center; gap: 20px; justify-self: end; grid-column: 3; }

  .favr-navitem { position: relative; }
  .favr-navitem__trigger { display: inline-flex; align-items: center; gap: 4px; }
  .favr-navitem__trigger svg { width: 12px; height: 12px; flex-shrink: 0; }
  .favr-navitem:hover .favr-navitem__trigger { color: #7C9B6A; }
  .favr-submenu {
    display: none; position: absolute; top: 100%; left: 0; margin-top: 0;
    min-width: 220px; z-index: 1500;
    box-shadow: 0 14px 30px rgba(0,0,0,0.18);
  }
  .favr-navitem { padding-bottom: 12px; margin-bottom: -12px; }
  .favr-navitem:hover .favr-submenu { display: block; }
  .favr-submenu__head {
    display: block; text-decoration: none;
    background: #7C9B6A; color: #ffffff;
    font-size: 13px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase;
    padding: 12px 18px;
  }
  .favr-submenu__head:hover { background: #6d8a5c; }
  .favr-submenu__body { background: #ffffff; padding: 6px 0; }
  .favr-submenu a {
    display: block; color: #111111; text-decoration: none;
    font-size: 13px; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase;
    padding: 11px 18px;
  }
  .favr-submenu a:hover { background: rgba(0,0,0,0.06); }


  .favr-header__burger {
    display: none; cursor: pointer;
    width: 24px; height: 16px; flex-direction: column;
    justify-content: space-between; flex-shrink: 0;
  }
  .favr-header__burger span { display: block; height: 2px; width: 100%; background: #111111; }

  /* ===== Breakpoint 1: <1150px – Nav zu Burger ===== */
  @media (max-width: 1150px) {
    .favr-header__nav { display: none; }
    .favr-header__burger { display: flex; }
    .favr-header__inner { padding: 16px 24px; }
  }

  /* ===== Breakpoint 2: <560px – kompakt ===== */
  @media (max-width: 560px) {
    .favr-header__inner { padding: 14px 16px; }
    .favr-header__logo-img { height: 70px; }
  }
</style>
