<style>
  /* =============================================
     FAVR Header Fragment – Toerschen (Tönisvorst)
     Dark Theme: Info-Leiste (590px Frame) + Hauptnav
     Burger links (2 Linien + Akzent-Linie), Logo mittig, Termin Buchen rechts
     Font: Inter
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { opacity: 1; visibility: visible; }

  /* Drawer: Fullscreen nummerierte Liste */
  .favr-drawer {
    position: fixed; inset: 0; width: 100%; height: 100vh;
    background: #0d0e0d;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto;
    opacity: 0; visibility: hidden;
    transition: opacity 0.25s ease;
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; padding: 40px 48px 20px; flex-shrink: 0;
  }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 56px; height: 56px;
    margin-left: -12px; flex-shrink: 0;
  }
  .favr-drawer__close svg {
    width: 30px; height: 30px; fill: none; stroke: #9c9c9c;
    stroke-width: 1.4; stroke-linecap: round;
  }
  .favr-drawer__nav {
    flex: 1 1 auto; padding: 40px 48px 40px;
    border-top: 1px solid rgba(255,255,255,0.12);
    display: flex; flex-direction: column;
  }
  .favr-drawer__row {
    display: flex; align-items: baseline; gap: 24px;
    padding: 26px 0; border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .favr-drawer__row:first-child { border-top: none; }
  .favr-drawer__index {
    font-size: 11px; font-weight: 400; color: #7a7a7a;
    letter-spacing: 0.05em; flex-shrink: 0; width: 20px;
  }
  .favr-drawer__row a {
    display: block; color: #dadada; text-decoration: none;
    font-size: 34px; font-weight: 500; letter-spacing: 0.01em;
    transition: opacity 0.15s;
  }
  .favr-drawer__row a:hover { opacity: 0.65; }

  @media (max-width: 560px) {
    .favr-drawer__head { padding: 28px 24px 14px; }
    .favr-drawer__nav { padding: 0 24px 24px; gap: 0; }
    .favr-drawer__row { padding: 18px 0; gap: 16px; }
    .favr-drawer__row a { font-size: 24px; }
  }

  /* Info-Leiste */
  .favr-infobar {
    width: 100%; background: #0d0e0d;
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .favr-infobar__inner {
    max-width: 590px; margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    gap: 28px; padding: 9px 16px; flex-wrap: wrap;
  }
  .favr-infobar__inner a,
  .favr-infobar__inner span {
    color: #dadada; font-size: 11px; font-weight: 400; letter-spacing: 0.03em;
    text-decoration: none; white-space: nowrap;
  }
  .favr-infobar__inner a:hover { color: #ffffff; }
  .favr-infobar__sep { color: rgba(255,255,255,0.25); font-size: 11px; }

  /* Hauptnav */
  .favr-header {
    width: 100%; background: #0d0e0d;
    position: sticky; top: 0; z-index: 1000;
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .favr-header__inner {
    width: 100%; min-height: 150px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; padding: 34px 40px 20px;
    animation: favr-header-shrink linear both;
    animation-timeline: scroll(root block);
    animation-range: 0px 240px;
  }
  @keyframes favr-header-shrink {
    from { padding-top: 34px; padding-bottom: 20px; min-height: 150px; }
    to   { padding-top: 12px; padding-bottom: 12px; min-height: 86px; }
  }

  /* Links: Burger + Menü-Label */
  .favr-header__trigger {
    display: flex; align-items: center; gap: 14px; cursor: pointer;
    flex: 1 1 0; min-width: 0;
  }
  .favr-header__burger {
    display: flex; flex-direction: column; gap: 6px; width: 34px; flex-shrink: 0;
  }
  .favr-header__burger span {
    display: block; height: 1.5px; width: 76%; background: #dbdbdb;
  }
  .favr-header__burger span.favr-header__burger-accent {
    width: 41%; background: #8a6b4e; height: 2px;
  }
  .favr-header__burger span.favr-header__burger-bottom {
    width: 100%;
  }
  .favr-header__trigger-label {
    font-size: 13px; font-weight: 300; letter-spacing: 0.12em;
    color: #dbdbdb; text-transform: uppercase; white-space: nowrap;
  }

  /* Mitte: Logo */
  .favr-header__logo {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    text-decoration: none; flex: 0 0 auto;
  }
  .favr-header__logo-img {
    height: 75px; width: auto; display: block;
    animation: favr-logo-shrink linear both;
    animation-timeline: scroll(root block);
    animation-range: 0px 240px;
  }
  @keyframes favr-logo-shrink {
    from { height: 75px; }
    to   { height: 42px; }
  }

  /* Rechts: Termin Buchen */
  .favr-header__cta {
    flex: 1 1 0; display: flex; justify-content: flex-end; min-width: 0;
  }
  .favr-header__cta a {
    display: inline-flex; align-items: center; gap: 8px;
    position: relative;
    text-decoration: none; color: #dbdbdb;
    font-size: 13px; font-weight: 300; letter-spacing: 0.1em;
    text-transform: uppercase; white-space: nowrap;
    padding-bottom: 7px;
  }
  .favr-header__cta a::after {
    content: ''; position: absolute; left: 0; bottom: 0;
    width: 32%; height: 1.5px; background: #8a6b4e;
  }
  .favr-header__cta a svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ===== Breakpoint 1: <900px ===== */
  @media (max-width: 900px) {
    .favr-header__inner { padding: 16px 20px; min-height: 120px; }
    .favr-header__logo-img { height: 57px; }
    .favr-header__trigger-label { font-size: 11px; }
    .favr-header__cta a { font-size: 11px; }
    .favr-infobar__inner { gap: 10px; padding: 8px 14px; }
    .favr-infobar__inner a, .favr-infobar__inner span { font-size: 10px; }
  }

  /* ===== Breakpoint 2: <560px – kompakt, kein Überlappen ===== */
  @media (max-width: 560px) {
    .favr-header__inner { padding: 14px 14px; min-height: 96px; gap: 10px; }
    .favr-header__logo-img { height: 43px; }
    .favr-header__logo { gap: 6px; }
    .favr-header__trigger-label { display: none; }
    .favr-header__burger { width: 22px; gap: 5px; }
    .favr-header__cta a span.favr-cta-label { display: none; }
    .favr-header__cta a { padding-bottom: 5px; }
    .favr-infobar__inner span.favr-infobar__tagline { display: none; }
  }

  /* ===== Breakpoint 3: <380px – Adresse/Telefon reduzieren ===== */
  @media (max-width: 380px) {
    .favr-infobar__inner { gap: 8px; }
    .favr-infobar__inner a, .favr-infobar__inner span { font-size: 9px; }
  }
</style>
