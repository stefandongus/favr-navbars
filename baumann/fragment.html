  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  #favr-burger-toggle { display: none; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; height: 100vh; background: #ffffff;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.1);
    transition: right 0.28s ease;
    font-family: 'Open Sans', sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
  }
  .favr-drawer__head img { height: 32px; width: auto; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: #f5f5f5; }
  .favr-drawer__close svg {
    width: 20px; height: 20px; fill: none; stroke: #2e7db5;
    stroke-width: 2; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #707173; text-decoration: none;
    font-size: 14px; font-weight: 300; padding: 13px 22px;
    border-bottom: 1px solid #f5f5f5;
    font-family: 'Open Sans', sans-serif;
    text-transform: uppercase; letter-spacing: 0.08em;
    transition: color 0.12s, background 0.12s;
  }
  .favr-drawer__nav a:hover { color: #2e7db5; background: #f8fbff; }
  .favr-drawer__footer {
    padding: 20px 22px; font-size: 13px; color: #999;
    line-height: 1.75; border-top: 1px solid #f0f0f0; margin-top: auto;
  }
  .favr-drawer__footer a { color: #2e7db5; text-decoration: none; }

  .favr-header {
    display: block; width: 100%; background: #ffffff;
    border-bottom: 1px solid #e8e8e8;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    position: sticky; top: 0; z-index: 1000;
    font-family: 'Open Sans', sans-serif;
  }

  .favr-header__inner {
    display: flex; flex-direction: row; align-items: center;
    justify-content: space-between;
    max-width: 1200px; margin: 0 auto;
    height: 80px; padding: 0 32px;
  }

  .favr-header__logo {
    display: flex; align-items: center;
    text-decoration: none; flex: 0 0 auto;
  }
  .favr-header__logo img { height: 36px; width: auto; display: block; }

  .favr-header__nav {
    display: flex; align-items: center; gap: 0; flex: 0 0 auto;
  }
  .favr-header__nav a {
    color: #707173; text-decoration: none;
    font-size: 13px; font-weight: 400;
    padding: 0 18px; height: 80px;
    display: flex; align-items: center;
    white-space: nowrap; transition: color 0.15s;
    font-family: 'Open Sans', sans-serif;
    text-transform: uppercase; letter-spacing: 0.08em;
    border-bottom: 3px solid transparent;
  }
  .favr-header__nav a:hover {
    color: #2e7db5; border-bottom-color: #2e7db5;
  }

  .favr-header__burger {
    display: none; align-items: center; justify-content: center;
    cursor: pointer; width: 36px; height: 36px;
    flex-shrink: 0; background: none; border: none; padding: 0;
  }
  .favr-header__burger svg {
    width: 22px; height: 22px; fill: none;
    stroke: #707173; stroke-width: 2; stroke-linecap: round;
  }

  @media (max-width: 900px) {
    .favr-header__inner { height: 64px; padding: 0 16px; }
    .favr-header__logo img { height: 28px; }
    .favr-header__nav { display: none; }
    .favr-header__burger { display: flex; }
  }
</style>
