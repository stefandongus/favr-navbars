<style>
  /* =============================================
     FAVR Header Fragment – Optik & Akustik Stock Solingen
     Weiß, Gold-Akzent, volle Breite
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  #favr-burger-toggle { display: none; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; height: 100vh; background: #ffffff;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
  }
  .favr-drawer__head img { height: 40px; width: auto; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: #f5f5f5; }
  .favr-drawer__close svg {
    width: 20px; height: 20px; fill: none; stroke: #1a1a1a;
    stroke-width: 2; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #2a2a2a; text-decoration: none;
    font-size: 13px; font-weight: 600; padding: 14px 22px;
    border-bottom: 1px solid #f5f5f5;
    letter-spacing: 0.08em; text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    transition: color 0.12s, background 0.12s;
  }
  .favr-drawer__nav a:hover { color: #c8a020; background: #fafafa; }
  .favr-drawer__nav a.is-active { color: #c8a020; }
  .favr-drawer__footer {
    padding: 20px 22px; font-size: 12px; color: #999;
    line-height: 1.75; border-top: 1px solid #f0f0f0; margin-top: auto;
  }
  .favr-drawer__footer a { color: #c8a020; text-decoration: none; }

  /* ── Header ── */
  .favr-header {
    display: block; width: 100%;
    background: #ffffff;
    border-bottom: 1px solid #ececec;
    position: sticky; top: 0; z-index: 1000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  .favr-header__inner {
    display: flex; flex-direction: row; align-items: center;
    justify-content: space-between;
    width: 100%; height: 160px; padding: 0 32px;
  }

  .favr-header__logo {
    display: flex; align-items: center;
    text-decoration: none; flex: 0 0 auto;
  }
  .favr-header__logo img { height: 134px; width: auto; display: block; }

  .favr-header__nav {
    display: flex; align-items: center; gap: 0; flex: 0 0 auto;
  }
  .favr-header__nav a {
    color: #4a4a4a; text-decoration: none;
    font-size: 14px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0 14px; white-space: nowrap;
    transition: color 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-header__nav a:hover { color: #c8a020; }
  .favr-header__nav a.is-active { color: #c8a020; }

  .favr-header__sep {
    width: 1px; height: 14px; background: #ddd;
  }

  .favr-header__burger {
    display: none; align-items: center; justify-content: center;
    cursor: pointer; width: 36px; height: 36px;
    flex-shrink: 0; background: none; border: none; padding: 0;
  }
  .favr-header__burger svg {
    width: 24px; height: 24px; fill: none;
    stroke: #2a2a2a; stroke-width: 1.8; stroke-linecap: round;
  }

  @media (max-width: 1100px) {
    .favr-header__inner {
      height: 160px; padding: 0 20px;
      position: relative;
      justify-content: center;
    }
    .favr-header__logo {
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .favr-header__nav { display: none; }
    .favr-header__burger {
      display: flex;
      position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
    }
  }
</style>
