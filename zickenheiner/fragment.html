<style>
  /* =============================================
     FAVR Header Fragment – Zickenheiner Optik (Lörrach)
     Weiß/Creme, Logo links (SVG), Nav rechts, aktiver Punkt in Pink
     Burger mit 2 Strichen sobald Nav kollabiert
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -300px;
    width: 280px; max-width: 86vw; height: 100vh;
    background: #FFFDFA;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.16);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 16px 18px; border-bottom: 1px solid rgba(0,0,0,0.08); flex-shrink: 0;
  }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 30px; height: 30px;
    border-radius: 50%; transition: background 0.12s; flex-shrink: 0;
  }
  .favr-drawer__close:hover { background: rgba(0,0,0,0.06); }
  .favr-drawer__close svg {
    width: 17px; height: 17px; fill: none; stroke: #1a1a1a;
    stroke-width: 1.8; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #2a2a2a; text-decoration: none;
    font-family: 'Neutra2-Book', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 15px; padding: 13px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    font-weight: 400; transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(0,0,0,0.04); }
  .favr-drawer__nav a.favr-active { color: #FFA2D9; }

  /* Header */
  .favr-header { width: 100%; background: #FFFDFA; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
  .favr-header__inner {
    width: 100%; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; padding: 20px 40px;
  }
  .favr-header__logo { display: block; text-decoration: none; flex: 0 0 auto; }
  .favr-header__logo-svg { height: 79px; width: auto; display: block; }

  .favr-header__nav { display: flex; align-items: center; gap: 40px; }
  .favr-header__nav a {
    color: #2a2a2a; text-decoration: none;
    font-family: 'Neutra2-Book', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 15px; font-weight: 400; line-height: 17px;
    white-space: nowrap; transition: opacity 0.15s;
  }
  .favr-header__nav a:hover { opacity: 0.65; }
  .favr-header__nav a.favr-active { color: #FFA2D9; }

  .favr-header__burger {
    display: none; cursor: pointer;
    width: 26px; height: 13px; flex-direction: column;
    justify-content: space-between; flex-shrink: 0;
  }
  .favr-header__burger span { display: block; height: 2px; width: 100%; background: #1a1a1a; }

  /* ===== Breakpoint: Nav kollabiert -> Burger mit 2 Strichen ===== */
  @media (max-width: 1150px) {
    .favr-header__nav { display: none; }
    .favr-header__burger { display: flex; }
    .favr-header__inner { padding: 16px 24px; }
    .favr-header__logo-svg { height: 65px; }
  }

  @media (max-width: 560px) {
    .favr-header__inner { padding: 14px 16px; }
    .favr-header__logo-svg { height: 55px; }
  }
</style>
