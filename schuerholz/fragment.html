<style>
  /* =============================================
     FAVR Header Fragment – Schürholz Brille & Linse (Essen)
     Weiß, immer Burger (kein Inline-Nav, auch Desktop)
     Frame-Höhe 125px. Drawer: Dunkelblau, aktiver Punkt hellblau
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(1,48,87,0.4); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; max-width: 88vw; height: 100vh;
    background: #013057;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 28px rgba(0,0,0,0.35);
    transition: right 0.3s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 20px 20px 6px;
  }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 34px; height: 34px;
    border: 1.5px solid #ffffff; border-radius: 4px; flex-shrink: 0;
  }
  .favr-drawer__close svg {
    width: 15px; height: 15px; fill: none; stroke: #ffffff;
    stroke-width: 2.4; stroke-linecap: round;
  }
  .favr-drawer__nav { padding: 10px 24px 24px; display: flex; flex-direction: column; gap: 6px; }
  .favr-drawer__nav a {
    display: block; color: #ffffff; text-decoration: none;
    font-size: 22px; font-weight: 400; padding: 12px 4px;
    transition: opacity 0.15s;
  }
  .favr-drawer__nav a:hover { opacity: 0.75; }
  .favr-drawer__nav a.favr-active { color: #418FDE; }
  .favr-drawer__nav a.favr-cta {
    color: #ffffff; background: #418FDE; border-radius: 4px;
    padding: 14px 16px; margin-top: 6px;
  }

  /* Header */
  .favr-header {
    width: 100%; min-height: 125px; background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    box-shadow: 0 6px 14px -4px rgba(1,48,87,0.18);
    position: relative; z-index: 900;
  }
  .favr-header__inner {
    width: 100%; min-height: 125px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; padding: 12px 252px 12px 120px;
  }
  .favr-header__logo { display: block; text-decoration: none; flex: 0 0 auto; }
  .favr-header__logo-img { height: 97px; width: auto; display: block; }

  .favr-header__burger {
    display: flex; cursor: pointer; align-items: center; justify-content: center;
    width: 26px; height: 22px; flex-direction: column;
    justify-content: space-between; flex-shrink: 0;
  }
  .favr-header__burger span { display: block; height: 2.6px; width: 100%; background: #013057; }

  /* ===== Breakpoint: <560px – kompakt ===== */
  @media (max-width: 560px) {
    .favr-header, .favr-header__inner { min-height: 84px; }
    .favr-header__inner { padding: 10px 30px 10px 24px; }
    .favr-header__logo-img { height: 65px; }
    .favr-header__burger { width: 29px; height: 22px; }
  }
</style>

<input type="checkbox" id="favr-burger-toggle" />
<label class="favr-overlay" for="favr-burger-toggle"></label>

<div class="favr-drawer">
  <div class="favr-drawer__head">
    <label class="favr-drawer__close" for="favr-burger-toggle" aria-label="Menü schließen">
      <svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg>
    </label>
  </div>
  <nav class="favr-drawer__nav" aria-label="Hauptnavigation">
    <a class="favr-active" href="https://www.optik-schuerholz.de/">Home</a>
    <a href="https://www.optik-schuerholz.de/brille/">Brille</a>
