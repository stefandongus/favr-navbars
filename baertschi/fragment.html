<style>
  /* =============================================
     FAVR Header Fragment – Bärtschi Optik Bern
     Dunkelblau #1e3750, Conduit ITC, SVG Logo
     ============================================= */

  @font-face {
    font-family: 'Conduit ITC';
    font-style: normal;
    font-weight: 300;
    src: url('https://www.baertschi.ch/_nuxt/fonts/996499d9-4799-4c1a-b2e9-01aecf944a67.a3f52b0.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Conduit ITC';
    font-style: normal;
    font-weight: 500;
    src: url('https://www.baertschi.ch/_nuxt/fonts/e3ae65fb-ca65-4b6d-bf6b-46b0223bb000.09c8619.woff2') format('woff2');
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  #favr-burger-toggle { display: none; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { left: 0; }

  .favr-drawer {
    position: fixed; top: 0; left: -320px;
    width: 300px; height: 100vh;
    background: #ffffff;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: 4px 0 24px rgba(0,0,0,0.3);
    transition: left 0.28s ease;
    font-family: 'Conduit ITC', 'Arial Narrow', Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid #e8eef3; flex-shrink: 0;
  }
  .favr-drawer__head img { height: 40px; width: auto; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: #e8eef3; }
  .favr-drawer__close svg {
    width: 20px; height: 20px; fill: none; stroke: #1e3750;
    stroke-width: 1.5; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #1e3750; text-decoration: none;
    font-size: 16px; font-weight: 300; padding: 13px 22px;
    border-bottom: 1px solid #e8eef3;
    font-family: 'Conduit ITC', 'Arial Narrow', Arial, sans-serif;
    letter-spacing: 0.05em;
    transition: color 0.12s, background 0.12s;
  }
  .favr-drawer__nav a:hover { color: #1e3750; background: #f0f4f8; }
  .favr-drawer__footer {
    padding: 20px 22px; font-size: 13px; color: #8899aa;
    line-height: 1.75; border-top: 1px solid #e8eef3; margin-top: auto;
  }
  .favr-drawer__footer a { color: #1e3750; text-decoration: none; }

  /* Header */
  .favr-header {
    display: block; width: 100%;
    background: #ffffff;
    position: sticky; top: 0; z-index: 1000;
    border-bottom: 1px solid #e0e8ef;
    font-family: 'Conduit ITC', 'Arial Narrow', Arial, sans-serif;
  }

  .favr-header__inner {
    display: flex; flex-direction: row; align-items: center;
    width: 100%; height: 140px; padding: 0 80px 0 120px;
    position: relative;
  }

  /* MENÜ links */
  .favr-header__menu-btn {
    display: flex; align-items: center; gap: 12px;
    flex: 0 0 auto; cursor: pointer;
  }
  .favr-header__menu-label {
    color: #1e3750;
    font-family: 'Conduit ITC', 'Arial Narrow', Arial, sans-serif;
    font-size: 25px; font-weight: 500;
    letter-spacing: 0.15em; text-transform: uppercase;
    user-select: none;
  }
  .favr-header__hamburger-icon {
    display: flex; flex-direction: column; gap: 5px; cursor: pointer;
  }
  .favr-header__hamburger-icon span {
    display: block; width: 24px; height: 1.5px;
    background: #1e3750;
  }

  /* Logo absolut zentriert */
  .favr-header__logo {
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    position: absolute;
    left: 50%; transform: translateX(-50%) translateY(16px);
  }
  .favr-header__logo img {
    height: 52px; width: auto; display: block;
  }

  /* Beratung rechts */
  .favr-header__right {
    display: flex; align-items: center; gap: 10px;
    margin-left: auto; flex: 0 0 auto;
  }
  .favr-header__cta {
    display: flex; align-items: center; gap: 8px;
    color: #1e3750; text-decoration: underline;
    text-underline-offset: 3px;
    font-family: 'Conduit ITC', 'Arial Narrow', Arial, sans-serif;
    font-size: 21px; font-weight: 300;
    letter-spacing: 0.12em; text-transform: uppercase;
    transition: color 0.15s;
  }
  .favr-header__cta:hover { color: #1e3750; }
  .favr-header__cta svg {
    width: 18px; height: 18px; fill: none;
    stroke: #1e3750; stroke-width: 1.5;
    stroke-linecap: round; stroke-linejoin: round;
  }

  @media (max-width: 1024px) {
    .favr-header__right { display: none; }
  }
  @media (max-width: 768px) {
    .favr-header__inner { height: 72px; padding: 0 32px; }
    .favr-header__logo { position: absolute; left: 50%; transform: translateX(-50%); }
    .favr-header__logo svg { height: 36px !important; }
  }
</style>
