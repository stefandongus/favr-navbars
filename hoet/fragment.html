<style>
  /* =============================================
     FAVR Header Fragment – Hoet Optiek (Belgien)
     Schwarz transparent, weiße Schrift, handschriftliches Logo
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  #favr-burger-toggle { display: none; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; height: 100vh; background: #0a0a0a;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.4);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 22px; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
  }
  .favr-drawer__head img { height: 52px; width: auto; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s;
  }
  .favr-drawer__close:hover { background: rgba(255,255,255,0.08); }
  .favr-drawer__close svg {
    width: 20px; height: 20px; fill: none; stroke: #ffffff;
    stroke-width: 1.5; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: rgba(255,255,255,0.85); text-decoration: none;
    font-size: 13px; font-weight: 600; padding: 14px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 0.08em; text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    transition: color 0.12s, background 0.12s;
  }
  .favr-drawer__nav a:hover { color: #ffffff; background: rgba(255,255,255,0.06); }
  .favr-drawer__footer {
    padding: 20px 22px; font-size: 12px; color: rgba(255,255,255,0.4);
    line-height: 1.75; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;
  }
  .favr-drawer__footer a { color: rgba(255,255,255,0.6); text-decoration: none; }

  /* ── Header ── */
  .favr-header {
    display: block; width: 100%;
    background: #000000;
    position: sticky; top: 0; z-index: 1000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  .favr-header__inner {
    display: flex; flex-direction: row; align-items: center;
    justify-content: space-between;
    width: 100%; height: 140px; padding: 0 40px;
    max-width: 1746px; margin: 0 auto;
  }

  .favr-header__logo {
    display: flex; align-items: center;
    text-decoration: none; flex: 0 0 auto;
  }
  .favr-header__logo img { height: 104px; width: auto; display: block; }

  .favr-header__right {
    display: flex; align-items: center; gap: 0; flex: 0 0 auto;
  }

  .favr-header__nav {
    display: flex; align-items: center; gap: 0;
  }
  .favr-nav-item { position: relative; height: 100%; display: flex; align-items: center; }
  .favr-header__nav a {
    color: rgba(255,255,255,0.9); text-decoration: none;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0 16px; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
    transition: opacity 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-header__nav a:hover { opacity: 0.7; }

  .favr-nav-arrow {
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid rgba(255,255,255,0.7);
    transition: transform 0.2s;
  }
  .favr-nav-item:hover .favr-nav-arrow { transform: rotate(180deg); }

  .favr-dropdown {
    display: none;
    position: absolute; top: 100%; left: 0;
    background: #eef1f1;
    min-width: 240px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    z-index: 100;
  }
  .favr-nav-item:hover .favr-dropdown { display: block; }
  .favr-dropdown a {
    display: block; color: #1a1a1a !important; text-decoration: none;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    padding: 16px 20px !important;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    transition: background 0.12s;
  }
  .favr-dropdown a:last-child { border-bottom: none; }
  .favr-dropdown a:hover { background: rgba(0,0,0,0.04); opacity: 1; }

  .favr-header__sep {
    width: 1px; height: 16px; background: rgba(255,255,255,0.3);
    margin: 0 8px;
  }

  .favr-header__lang {
    color: rgba(255,255,255,0.9); text-decoration: none;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.05em; padding: 0 10px;
    display: flex; align-items: center; gap: 4px;
  }
  .favr-header__lang:hover { opacity: 0.7; }

  .favr-header__burger {
    display: none; align-items: center; justify-content: center;
    cursor: pointer; width: 36px; height: 36px;
    flex-shrink: 0; background: none; border: none; padding: 0;
  }
  .favr-header__burger svg {
    width: 24px; height: 24px; fill: none;
    stroke: #ffffff; stroke-width: 1.8; stroke-linecap: round;
  }

  @media (max-width: 1100px) {
    .favr-header__inner { height: 80px; padding: 0 20px; }
    .favr-header__logo img { height: 65px; }
    .favr-header__nav { display: none; }
    .favr-header__burger { display: flex; }
  }
</style>
