<style>
  /* =============================================
     FAVR Header Fragment – Bellevue Hamburg
     Minimalistisch: Burger+Menu links, Logo mittig, Termin rechts
     Alle Navigationspunkte liegen hinter dem Burger (kein sichtbares Inline-Menü, auch Desktop)
     Frame-Referenz: 1200 x 175px
     Breakpoint <640px: Logo/Icon kleiner, Abstände enger
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { left: 0; }

  /* Drawer (slide-in von links, passend zum Burger links) */
  .favr-drawer {
    position: fixed; top: 0; left: -340px;
    width: 320px; max-width: 88vw; height: 100vh;
    background: #ffffff;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: 4px 0 28px rgba(0,0,0,0.18);
    transition: left 0.3s ease;
    font-family: 'Arial Narrow', Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 24px; border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0;
  }
  .favr-drawer__logo {
    font-size: 18px; font-weight: 700; letter-spacing: 0.04em;
    color: #111; text-transform: uppercase;
  }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s; flex-shrink: 0;
  }
  .favr-drawer__close:hover { background: rgba(0,0,0,0.06); }
  .favr-drawer__close svg {
    width: 18px; height: 18px; fill: none; stroke: #111;
    stroke-width: 1.6; stroke-linecap: round;
  }
  .favr-drawer__nav { padding: 8px 0 20px; }
  .favr-drawer__nav a {
    display: block; color: #1a1a1a; text-decoration: none;
    font-size: 16px; letter-spacing: 0.03em; padding: 15px 24px;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    font-weight: 400; transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(0,0,0,0.04); }
  .favr-drawer__cta {
    padding: 18px 24px; margin-top: auto;
    border-top: 1px solid rgba(0,0,0,0.1);
    font-family: Arial, Helvetica, sans-serif;
  }
  .favr-drawer__cta a {
    display: block; text-align: center; text-decoration: underline;
    background: #ede1e5; color: #111; font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; padding: 14px 16px; text-transform: uppercase;
  }

  /* Header */
  .favr-header {
    width: 100%; background: #ffffff;
    position: sticky; top: 0; z-index: 1000;
  }
  .favr-header__inner {
    max-width: 1200px; margin: 0 auto; min-height: 175px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; padding: 20px 40px;
  }

  /* Links: Burger + Menu-Label */
  .favr-header__trigger {
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    flex: 1 1 0; min-width: 0;
    font-family: Arial, Helvetica, sans-serif;
  }
  .favr-header__burger {
    display: flex; flex-direction: column; justify-content: space-between;
    width: 26px; height: 16px; flex-shrink: 0;
  }
  .favr-header__burger span {
    display: block; height: 2px; width: 100%; background: #111;
  }
  .favr-header__trigger-label {
    font-family: 'FuturaNextCn-Medium', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    font-size: 13px; font-weight: 400; letter-spacing: 0.1em;
    color: #111; text-transform: uppercase; white-space: nowrap;
  }

  /* Mitte: Logo */
  .favr-header__logo {
    display: flex; align-items: center; gap: 16px; text-decoration: none;
    flex: 0 0 auto;
  }
  .favr-header__logo-img { height: 64px; width: auto; display: block; }

  /* Rechts: Termin-Button */
  .favr-header__cta {
    flex: 1 1 0; display: flex; justify-content: flex-end; min-width: 0;
    font-family: Arial, Helvetica, sans-serif;
  }
  .favr-header__cta a {
    display: inline-block; text-decoration: underline;
    background: #ede1e5; color: #000000;
    font-family: 'FuturaNextCn-Medium', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    font-size: 18px; font-weight: 400; line-height: 27px; letter-spacing: normal;
    text-transform: uppercase; white-space: nowrap;
    padding: 10px 22px;
  }

  /* ===== Breakpoint 1: <900px – Logo/Textgrößen reduzieren ===== */
  @media (max-width: 900px) {
    .favr-header__inner { padding: 16px 20px; min-height: 130px; }
    .favr-header__logo-img { height: 48px; }
    .favr-header__trigger-label { font-size: 11px; }
    .favr-header__cta a { font-size: 15px; padding: 9px 16px; }
  }

  /* ===== Breakpoint 2: <560px – noch kompakter, kein Überlappen ===== */
  @media (max-width: 560px) {
    .favr-header__inner { padding: 14px 14px; min-height: 100px; gap: 10px; }
    .favr-header__logo-img { height: 36px; }
    .favr-header__trigger-label { display: none; }
    .favr-header__burger { width: 22px; height: 14px; }
    .favr-header__cta a { font-size: 12px; padding: 8px 12px; }
  }
</style>
