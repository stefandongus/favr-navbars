<style>
  /* =============================================
     FAVR Header Fragment – City Optik Stockholm
     Weiß, Logo+Nav zentriert, Account/Sök/Varukorg rechts (Frame 1750px)
     ============================================= */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #favr-burger-toggle { display: none !important; width: 0 !important; overflow: hidden !important; }

  .favr-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 2000; cursor: pointer;
  }
  #favr-burger-toggle:checked ~ .favr-overlay { display: block; }
  #favr-burger-toggle:checked ~ .favr-drawer { right: 0; }

  /* Drawer */
  .favr-drawer {
    position: fixed; top: 0; right: -320px;
    width: 300px; max-width: 86vw; height: 100vh;
    background: #ffffff;
    z-index: 2001; display: flex; flex-direction: column;
    overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,0.16);
    transition: right 0.28s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }
  .favr-drawer__head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0;
  }
  .favr-drawer__logo-svg { height: 38px; width: auto; display: block; }
  .favr-drawer__close {
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; width: 32px; height: 32px;
    border-radius: 50%; transition: background 0.12s; flex-shrink: 0;
  }
  .favr-drawer__close:hover { background: rgba(0,0,0,0.06); }
  .favr-drawer__close svg {
    width: 18px; height: 18px; fill: none; stroke: #1d1d1b;
    stroke-width: 1.6; stroke-linecap: round;
  }
  .favr-drawer__nav a {
    display: block; color: #1d1d1b; text-decoration: none;
    font-size: 14px; padding: 14px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    font-weight: 400; transition: background 0.12s;
  }
  .favr-drawer__nav a:hover { background: rgba(0,0,0,0.04); }
  .favr-drawer__utility { padding: 14px 20px; display: flex; flex-direction: column; gap: 12px; margin-top: auto; border-top: 1px solid rgba(0,0,0,0.1); }
  .favr-drawer__utility a { display: flex; align-items: center; gap: 10px; color: #1d1d1b; text-decoration: none; font-size: 13px; }
  .favr-drawer__utility svg { width: 16px; height: 16px; stroke: #1d1d1b; fill: none; stroke-width: 1.6; }

  /* Header */
  .favr-header { width: 100%; background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }

  .favr-header__row1 {
    max-width: 1750px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    gap: 20px; padding: 18px 40px 14px;
  }
  .favr-header__spacer { justify-self: start; }
  .favr-header__logo { display: block; text-decoration: none; justify-self: center; }
  .favr-header__logo-svg { height: 87px; width: auto; display: block; }

  .favr-header__utility { display: flex; align-items: center; gap: 26px; justify-self: end; }
  .favr-header__utility a {
    display: inline-flex; align-items: center; gap: 6px;
    color: #1d1d1b; text-decoration: none; font-size: 13px; white-space: nowrap;
  }
  .favr-header__utility svg { width: 17px; height: 17px; stroke: #1d1d1b; fill: none; stroke-width: 1.5; flex-shrink: 0; }
  .favr-header__utility a:hover { opacity: 0.6; }

  .favr-header__row2 {
    border-top: 1px solid rgba(0,0,0,0.1);
    width: 100%;
  }
  .favr-header__nav {
    max-width: 1750px; margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    gap: 30px; padding: 22px 40px 14px; flex-wrap: wrap;
  }
  .favr-header__nav a {
    color: #1d1d1b; text-decoration: none;
    font-size: 14px; font-weight: 300;
    white-space: nowrap; padding-bottom: 3px;
    border-bottom: 1px solid transparent;
    transition: opacity 0.15s;
  }
  .favr-header__nav a:hover { opacity: 0.6; }
  .favr-header__nav a.favr-active { border-bottom-color: #1d1d1b; }

  .favr-header__burger {
    display: none; cursor: pointer; justify-self: end;
    width: 24px; height: 16px; flex-direction: column;
    justify-content: space-between; flex-shrink: 0;
  }
  .favr-header__burger span { display: block; height: 1.5px; width: 100%; background: #1d1d1b; }

  /* ===== Breakpoint 1: <1050px – Nav zu Burger, Logo/Utility neu angeordnet ===== */
  @media (max-width: 1050px) {
    .favr-header__row2 { display: none; }
    .favr-header__row1 {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px;
    }
    .favr-header__spacer { display: flex; align-items: center; order: 1; }
    .favr-header__burger { display: flex; }
    .favr-header__logo { order: 2; margin-right: auto; margin-left: 16px; }
    .favr-header__logo-svg { height: 63px; }
    .favr-header__utility { order: 3; gap: 18px; }
    .favr-header__utility a[href*="customer_authentication"] { display: none; }
    .favr-header__utility a span.favr-utility-label { display: none; }
  }

  /* ===== Breakpoint 2: <560px – kompakt ===== */
  @media (max-width: 560px) {
    .favr-header__row1 { padding: 14px 16px; gap: 10px; }
    .favr-header__logo-svg { height: 48px; }
    .favr-header__utility { gap: 16px; }
  }
</style>
